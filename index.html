<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Controle de Docas - Logton Fulfillment</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B2A4A">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#E8611A;--orange-dk:#C9500F;--orange-lt:#FFF4ED;--navy:#1B2A4A;--white:#FFF;--bg:#F4F5F7;--card:#FFF;--text:#1B2A4A;--text-mid:#444;--muted:#888;--border:#E0E0E0;--border-lt:#EBEBEB;--success:#28A060;--success-bg:#E6F7EE;--danger:#DC3C3C;--danger-bg:#FDE8E8;--blue-bg:#EBF0FA;--blue:#3668C9;--purple:#7C4DFF;--purple-bg:#F3EEFF}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;position:relative;min-height:100vh}
.header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 16px rgba(27,42,74,.25);position:sticky;top:0;z-index:100}
.header-logo{display:flex;align-items:center;gap:12px}
.header-logo img{width:42px;height:42px;border-radius:8px;object-fit:contain;background:#fff}
.header-logo .sub{color:var(--orange);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px}
.header-logo .title{color:#fff;font-size:15px;font-weight:700}
.header-right{display:flex;align-items:center;gap:10px}
.cfg-btn{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 8px;cursor:pointer;font-size:16px}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.status-text{color:rgba(255,255,255,.45);font-size:10px;font-family:monospace}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:14px 16px 6px}
.stat{background:var(--card);border-radius:12px;padding:12px 10px;box-shadow:0 1px 4px rgba(0,0,0,.05);text-align:center}
.stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin:0 auto 4px}
.stat-val{font-size:20px;font-weight:700;font-family:monospace;color:var(--text)}
.stat-label{font-size:10px;color:var(--muted);font-weight:500}
.tabs{display:flex;gap:6px;padding:8px 16px 0}
.tab{flex:1;padding:10px 6px;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.content{padding:16px;padding-bottom:100px}
.card{background:var(--card);border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden}
.card-hdr{padding:16px 20px;border-bottom:1px solid var(--border-lt);font-weight:700;font-size:15px;display:flex;align-items:center;gap:10px}
.card-hdr-icon{width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.card-body{padding:20px;display:flex;flex-direction:column;gap:16px}
label.lbl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.inp{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:var(--white);outline:none;color:var(--text)}
.inp:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,97,26,.1)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .1s;border-width:1.5px;border-style:solid}
.time-wrap{position:relative}
.now-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);color:#fff;border:none;border-radius:6px;padding:4px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:monospace}
.btn-submit{padding:16px;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.sig-wrap{position:relative;border:2px dashed #ccc;border-radius:10px;overflow:hidden;background:#FAFAFA;touch-action:none}
.sig-canvas{width:100%;height:120px;display:block;cursor:crosshair}
.sig-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;color:#aaa;font-size:13px}
.sig-line{position:absolute;bottom:14px;left:20px;right:20px;border-bottom:1.5px solid #ddd;pointer-events:none}
.sig-clear{margin-top:6px;padding:6px 14px;background:transparent;color:#888;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.filter-row{display:flex;gap:6px;margin-bottom:10px}
.filter-btn{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.reg-card{background:var(--card);border-radius:14px;box-shadow:0 1px 6px rgba(0,0,0,.05);overflow:hidden;margin-bottom:10px}
.reg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;cursor:pointer}
.reg-grid{display:grid;gap:6px;margin-bottom:6px}
.reg-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
.reg-value{font-size:13px;font-family:monospace;font-weight:600}
.badge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.tag{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.actions{display:flex;gap:8px;margin-top:10px}
.act-btn{padding:10px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex:1}
.obs-box{background:var(--bg);padding:8px 10px;border-radius:6px;font-size:12px;color:var(--muted);margin-top:8px}
.volumes{display:flex;gap:12px;font-size:12px;margin-top:6px;color:var(--text-mid)}
.sig-view{background:#FAFAFA;border:1px solid var(--border);border-radius:8px;padding:8px;text-align:center;margin-top:12px;border-top:1px solid var(--border-lt);padding-top:12px}
.sig-view img{max-width:100%;height:70px;object-fit:contain}
.modal-bg{position:fixed;inset:0;background:rgba(27,42,74,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:85vh;overflow:auto}
.modal-hdr{padding:18px 20px;border-bottom:1px solid var(--border-lt);display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.modal-body{padding:20px;font-size:14px;line-height:1.7;color:var(--muted)}
.info-box{background:var(--blue-bg);padding:14px;border-radius:10px;margin-bottom:16px;font-size:13px}
.code-block{background:var(--navy);color:#d4ddf0;padding:14px;border-radius:8px;font-family:monospace;font-size:10px;line-height:1.5;white-space:pre-wrap;margin-bottom:16px;max-height:200px;overflow:auto}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 8px 24px rgba(27,42,74,.25);font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;z-index:1000;white-space:nowrap;transition:opacity .3s}
.empty{background:var(--card);border-radius:14px;padding:48px 20px;text-align:center}
.desc-box{background:var(--bg);padding:8px 10px;border-radius:6px;font-size:12px;color:var(--text-mid);margin-bottom:6px}
</style>
</head>

  regFilter: "all",
  expandedId: null,
  coletas: JSON.parse(localStorage.getItem("docas_coletas") || "[]"),
  recebimentos: JSON.parse(localStorage.getItem("docas_recebimentos") || "[]"),
  toast: null
};

function save() {
  localStorage.setItem("docas_coletas", JSON.stringify(state.coletas));
  localStorage.setItem("docas_recebimentos", JSON.stringify(state.recebimentos));
  localStorage.setItem("docas_sheets_url", state.sheetsUrl);
}

function getToday() { return new Date().toISOString().split("T")[0]; }
function getNow() { const n=new Date(); return `${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`; }
function fmtDate(d) { if(!d)return""; const[y,m,dd]=d.split("-"); return `${dd}/${m}/${y}`; }
function calcDur(e,s) { if(!e||!s)return"\u2014"; const[h1,m1]=e.split(":").map(Number);const[h2,m2]=s.split(":").map(Number);let d=h2*60+m2-(h1*60+m1);if(d<0)d+=1440;const h=Math.floor(d/60),m=d%60;return h>0?`${h}h${m}min`:`${m}min`; }
function esc(s) { const d=document.createElement("div");d.textContent=s;return d.innerHTML; }

let toastTimer;
function showToast(msg, type) {
  state.toast = {msg, type};
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { state.toast = null; render(); }, 3000);
}

// ═══ SHEETS INTEGRATION ═══
async function sendToSheets(tipo, registro) {
  if (!state.sheetsUrl) return;
  state.sending = true; render();
  try {
    await fetch(state.sheetsUrl, {
      method: "POST", mode: "no-cors",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({tipo, registro})
    });
    state.sending = false;
  } catch(err) {
    state.sending = false;
    showToast("Erro ao enviar para Sheets", "error");
  }
}

// ═══ SIGNATURE PAD ═══
let sigCanvas, sigCtx, sigDrawing=false, sigHasContent=false, sigData=null;
function initSig() {
  sigCanvas = document.getElementById("sigCanvas");
  if (!sigCanvas) return;
  sigCtx = sigCanvas.getContext("2d");
  const rect = sigCanvas.getBoundingClientRect();
  sigCanvas.width = rect.width * 2;
  sigCanvas.height = rect.height * 2;
  sigCtx.scale(2,2);
  sigCtx.strokeStyle = "#1B2A4A";
  sigCtx.lineWidth = 2.5;
  sigCtx.lineCap = "round";
  sigCtx.lineJoin = "round";
  sigHasContent = false; sigData = null;
  const getPos = (e) => { const r=sigCanvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}; };
  const start = (e) => { e.preventDefault();sigCtx.beginPath();const p=getPos(e);sigCtx.moveTo(p.x,p.y);sigDrawing=true; };
  const move = (e) => { if(!sigDrawing)return;e.preventDefault();const p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();sigHasContent=true;document.getElementById("sigPlaceholder").style.display="none";document.getElementById("sigClearBtn").style.display="inline-block"; };
  const end = (e) => { if(!sigDrawing)return;e.preventDefault();sigDrawing=false;sigData=sigCanvas.toDataURL("image/png"); };
  sigCanvas.addEventListener("mousedown",start);sigCanvas.addEventListener("mousemove",move);sigCanvas.addEventListener("mouseup",end);sigCanvas.addEventListener("mouseleave",end);
  sigCanvas.addEventListener("touchstart",start);sigCanvas.addEventListener("touchmove",move);sigCanvas.addEventListener("touchend",end);
}
function clearSig() {
  const rect=sigCanvas.getBoundingClientRect();
  sigCtx.clearRect(0,0,rect.width,rect.height);
  sigHasContent=false;sigData=null;
  document.getElementById("sigPlaceholder").style.display="flex";
  document.getElementById("sigClearBtn").style.display="none";
}

// ═══ SUBMIT COLETA ═══
function submitColeta() {
  const f = id => document.getElementById(id);
  const transp = f("cTransp").value.trim();
  const entrada = f("cEntrada").value;
  const resp = f("cResp").value.trim();
  if (!transp||!entrada||!resp) { showToast("Preencha os campos obrigatórios","error"); return; }
  const tipo = document.querySelector('input[name="cTipo"]:checked').value;
  const novo = {
    id: Date.now(), _type:"coleta", data: f("cData").value, tipo,
    transportadora: transp, marketplace: f("cMkt")?.value||"",
    horarioEntrada: entrada, horarioSaida: f("cSaida").value||"",
    qtdCaixas: f("cCaixas").value?Number(f("cCaixas").value):0,
    qtdPaletes: f("cPaletes").value?Number(f("cPaletes").value):0,
    responsavel: resp, observacoes: f("cObs").value.trim(),
    assinatura: sigData
  };
  state.coletas.unshift(novo); save();
  const sd = {
    data:fmtDate(novo.data),tipoColeta:tipo==="exportacao"?"Exportacao":"E-commerce/Nacional",
    transportadora:novo.transportadora,marketplace:novo.marketplace,
    horarioEntrada:novo.horarioEntrada,horarioSaida:novo.horarioSaida,
    caixas:novo.qtdCaixas,paletes:novo.qtdPaletes,
    responsavel:novo.responsavel,observacoes:novo.observacoes,
    temAssinatura:sigData?"Sim":"Nao"
  };
  if(state.sheetsUrl){sendToSheets("coleta",sd);showToast("Coleta registrada e enviada!");}
  else showToast("Coleta registrada!");
  selectedMkts = [];
  state.view="registros";render();
}

// ═══ SUBMIT RECEBIMENTO ═══
function submitRecebimento() {
  const f = id => document.getElementById(id);
  const cliente=f("rCliente").value.trim(),transp=f("rTransp").value.trim(),desc=f("rDescricao").value.trim(),hora=f("rHora").value,resp=f("rResp").value.trim();
  if(!cliente||!transp||!desc||!hora||!resp){showToast("Preencha os campos obrigatorios","error");return;}
  const cx=f("rCaixas").value,plt=f("rPaletes").value,extra=f("rQtdExtra").value;
  if(!cx&&!plt&&!extra){showToast("Informe quantidade","error");return;}
  const novo = {
    id:Date.now(),_type:"recebimento",data:f("rData").value,hora,cliente,transportadora:transp,
    descricao:desc,qtdCaixas:cx?Number(cx):0,qtdPaletes:plt?Number(plt):0,
    unidadeExtra:f("rUnidExtra").value.trim(),qtdExtra:extra||"",
    responsavel:resp,observacoes:f("rObs").value.trim()
  };
  state.recebimentos.unshift(novo);save();
  const sd={data:fmtDate(novo.data),hora:novo.hora,cliente:novo.cliente,transportadora:novo.transportadora,descricao:novo.descricao,caixas:novo.qtdCaixas,paletes:novo.qtdPaletes,unidadeExtra:novo.unidadeExtra,qtdExtra:novo.qtdExtra||0,responsavel:novo.responsavel,observacoes:novo.observacoes};
  if(state.sheetsUrl){sendToSheets("recebimento",sd);showToast("Recebimento registrado e enviado!");}
  else showToast("Recebimento registrado!");
  state.view="registros";render();
}

function registrarSaida(id){state.coletas=state.coletas.map(r=>r.id===id?{...r,horarioSaida:getNow()}:r);save();showToast("Saida registrada!");render();}
function excluir(id,type){state[type==="coleta"?"coletas":"recebimentos"]=state[type==="coleta"?"coletas":"recebimentos"].filter(r=>r.id!==id);save();showToast("Excluido","error");render();}
function setChip(inputId,val){document.getElementById(inputId).value=val;}
let selectedMkts = [];
function toggleMkt(m) {
  const idx = selectedMkts.indexOf(m);
  if (idx >= 0) selectedMkts.splice(idx, 1);
  else selectedMkts.push(m);
  document.getElementById("cMkt").value = selectedMkts.join(", ");
  document.querySelectorAll('.mkt-chip').forEach(el => {
    const active = selectedMkts.includes(el.dataset.mkt);
    el.style.background = active ? 'var(--navy)' : 'var(--white)';
    el.style.color = active ? '#fff' : 'var(--text-mid)';
    el.style.borderColor = active ? 'var(--navy)' : 'var(--border)';
  });
}

  if(state.showConfig) {
    h+=`<div class="modal-bg" onclick="if(event.target===this){state.showConfig=false;render()}">
      <div class="modal"><div class="modal-hdr"><span style="font-weight:700;font-size:15px;color:var(--text)">&#9881; Google Sheets</span><button class="modal-close" onclick="state.showConfig=false;render()">&#215;</button></div>
      <div class="modal-body">
        <div class="info-box"><strong style="color:var(--text)">Passo a passo:</strong><br><br>
        1. Abra a planilha no Google Sheets<br>
        2. Extensoes > Apps Script<br>
        3. Cole o codigo e implante como App da Web<br>
        4. Cole a URL abaixo</div>
        <div style="margin-bottom:16px"><label class="lbl">URL do Apps Script</label><input id="cfgUrl" class="inp" placeholder="https://script.google.com/macros/s/..." value="${esc(state.sheetsUrl)}"></div>
        <button class="btn-submit" style="background:var(--orange)" onclick="state.sheetsUrl=document.getElementById('cfgUrl').value.trim();save();state.showConfig=false;showToast(state.sheetsUrl?'URL salva!':'URL removida');render()">&#128190; Salvar URL</button>
        ${state.sheetsUrl?'<div style="margin-top:12px;padding:10px;background:var(--success-bg);border-radius:8px;font-size:12px;color:var(--success);text-align:center">&#10003; Integracao ativa</div>':''}
      </div></div></div>`;
  }

  // TOAST
  if(state.toast) {
    const icon = state.toast.type==="error"?"&#9888;":"&#10004;";
    const bColor = state.toast.type==="error"?"var(--danger)":"var(--success)";
    h+=`<div class="toast" style="border-left:4px solid ${bColor}">${icon} ${esc(state.toast.msg)}</div>`;
  }

  document.getElementById("app").innerHTML = h;

  // Init signature if coleta view
  if(v==="coleta") setTimeout(initSig, 50);

  // Marketplace chip clicks
  document.querySelectorAll('.chip').forEach(el => {
    el.addEventListener('click', function() {
      const parent = this.closest('.chips');
      if (parent) {
        parent.querySelectorAll('.chip').forEach(c => {
          c.style.background = 'var(--white)';
          c.style.color = 'var(--text-mid)';
          c.style.borderColor = 'var(--border)';
        });
        this.style.background = 'var(--orange)';
        this.style.color = '#fff';
        this.style.borderColor = 'var(--orange)';
      }
    });
  });

  // Radio type styling
  document.querySelectorAll('input[name="cTipo"]').forEach(radio => {
    radio.closest('label').style.borderColor = radio.checked ? 'var(--orange)' : 'var(--border)';
    radio.closest('label').style.background = radio.checked ? 'var(--orange-lt)' : 'var(--white)';
    radio.addEventListener('change', () => {
      document.querySelectorAll('input[name="cTipo"]').forEach(r => {
        r.closest('label').style.borderColor = r.checked ? 'var(--orange)' : 'var(--border)';
        r.closest('label').style.background = r.checked ? 'var(--orange-lt)' : 'var(--white)';
      });
    });
  });
}

// ═══ INIT ═══
render();
</script>
</body>
</html>
